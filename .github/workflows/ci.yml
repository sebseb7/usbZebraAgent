name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libuv1-dev \
            libusb-1.0-0-dev \
            libcurl4-openssl-dev \
            pkg-config

      - name: Build
        run: make clean all

      - name: Verify binary
        run: test -x ./usbprintagent
